name: Sync FDA Puffery Ads

on:
  schedule:
    - cron: '42 19 * * 2'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Sync FDA puffery ad alerts
        run: npm run sync:fda-puffery-ads -- --max-pages=20

      - name: Commit updated FDA ad alert index
        run: |
          if git diff --quiet -- functions/api/synced-fda-ad-alerts.js; then
            echo "No FDA ad alert index changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add functions/api/synced-fda-ad-alerts.js
          git commit -m "chore: sync fda ad alerts"
          git push
