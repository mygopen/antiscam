name: Sync FTC Decisions

on:
  schedule:
    - cron: '22 19 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install PDF text extractor
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Sync Fair Trade Commission decisions
        run: npm run sync:ftc-decisions -- --max-pages=12

      - name: Commit updated FTC decision index
        run: |
          if git diff --quiet -- functions/api/synced-official-penalty-records.js; then
            echo "No FTC decision index changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add functions/api/synced-official-penalty-records.js
          git commit -m "chore: sync ftc decision alerts"
          git push
